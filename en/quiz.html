  <style>
    .quiz-wrap{max-width:640px;margin:0 auto;padding:clamp(1.5rem,5vw,3rem) 0 4rem;}
    .quiz-head{text-align:center;margin-bottom:1.4rem;}
    .quiz-head h1{font-size:var(--step-3);}
    .quiz-head p{color:var(--text-soft);margin-top:.5rem;}
    .quiz-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow);padding:clamp(1.4rem,4vw,2.4rem);}
    .q-progress{height:6px;border-radius:99px;background:var(--cream-deep);margin-bottom:1.5rem;overflow:hidden;}
    .q-progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--sage),var(--clay));transition:width .4s var(--ease);}
    .q-step{font-size:var(--step--1);color:var(--text-soft);font-weight:700;margin-bottom:.5rem;}
    .q-question{font-family:var(--font-display);font-size:var(--step-2);color:var(--sage-ink);margin-bottom:1.3rem;line-height:1.15;}
    .q-opts{display:grid;gap:.6rem;}
    .q-opt{display:flex;align-items:center;gap:.7rem;text-align:left;background:var(--cream);border:1.5px solid var(--line);border-radius:var(--r);padding:.85em 1.1em;font:inherit;font-weight:600;color:var(--sage-ink);cursor:pointer;transition:.2s;}
    .q-opt:hover{border-color:var(--sage);background:#fff;transform:translateY(-1px);}
    .q-opt .dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--sage);flex:none;}
    .q-intro{text-align:center;}
    .q-intro p{color:var(--text-soft);margin:.4rem 0 1.4rem;}
    .q-result{text-align:center;}
    .q-badge{font-size:2.6rem;line-height:1;}
    .q-tier{font-family:var(--font-display);font-size:var(--step-3);margin:.4rem 0 .1rem;}
    .q-sub{color:var(--text-soft);font-weight:700;font-size:var(--step--1);margin-bottom:.3rem;}
    .q-meter{height:12px;border-radius:99px;background:var(--cream-deep);overflow:hidden;margin:1rem 0 .4rem;}
    .q-meter i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,#6E9476,#D7AE63,#C76B4E);transition:width .8s var(--ease);}
    .q-msg{color:var(--text-soft);margin:.8rem 0 1rem;}
    .q-plan{text-align:left;background:var(--cream);border:1px solid var(--line);border-radius:var(--r);padding:1rem 1.2rem;margin:1rem 0;}
    .q-plan b{display:block;color:var(--sage-deep);margin-bottom:.5rem;}
    .q-plan ul{display:grid;gap:.45rem;}
    .q-plan li{display:flex;gap:.6rem;align-items:flex-start;font-size:var(--step--1);color:var(--sage-ink);}
    .q-plan li::before{content:"✓";color:var(--sage);font-weight:800;}
    .q-email{display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;margin:1.1rem 0 .3rem;}
    .q-email input{flex:1;min-width:200px;padding:.85em 1em;border:1.5px solid var(--line);border-radius:var(--r-sm);font:inherit;background:var(--cream);}
    .q-email input:focus{outline:none;border-color:var(--sage);box-shadow:var(--ring);background:#fff;}
    .q-discount{background:var(--blush);border-radius:var(--r);padding:.9rem 1.1rem;margin:.6rem 0;font-weight:700;color:var(--clay-deep);}
    .q-discount b{font-family:var(--font-display);letter-spacing:.05em;}
    .q-disc{font-size:.78rem;color:var(--text-soft);margin-top:1.4rem;border-top:1px solid var(--line);padding-top:1rem;text-align:left;}
  </style>
</head>
<body>
  <header class="legal-top">
    <div class="container">
      <a href="index.html" class="brand" aria-label="Cortisol Reset – home">
        <span class="mark" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none"><path d="M12 3c4 2.5 6 5 6 8.5A6 6 0 1 1 6 11.5C6 8 8 5.5 12 3z" fill="currentColor"/></svg></span>
        <span>Cortisol Reset<small>with Hana Mašínová</small></span>
      </a>
      <a href="index.html" class="btn btn--ghost" style="padding:.6em 1.2em">← Back to site</a>
    </div>
  </header>

  <main class="container">
    <div class="quiz-wrap">
      <div class="quiz-head">
        <span class="eyebrow" style="justify-content:center">Free quiz · 2 minutes</span>
        <h1>What's your cortisol type?</h1>
        <p>8 quick questions. At the end you'll get your type, your stress load and a tailored 28-day plan.</p>
      </div>

      <div class="quiz-card">
        <div class="q-progress" aria-hidden="true"><i id="qbar"></i></div>
        <div id="qstage"></div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-bottom" style="border:none;padding-top:0">
        <span>© <span id="year">2026</span> Cortisol Reset · Hana Mašínová</span>
        <span><a href="index.html">Home</a> · <a href="index.html#cena">Programme</a> · <a href="blog/">Blog</a></span>
      </div>
    </div>
  </footer>

  <script>
  (function(){
    var Q = [
      ['Do you wake in the night, often around 3am?','sleep'],
      ['Can\'t you switch your head off and fall asleep at night?','sleep'],
      ['Do you often feel stressed or "on the go" non-stop?','tension'],
      ['Are your mood and patience on a rollercoaster?','tension'],
      ['Do you wake up tired even when you\'ve slept enough?','energy'],
      ['Do you run on coffee just to function?','energy'],
      ['Do sugar or salt cravings hit you in the afternoon?','cravings'],
      ['Does fat cling to your belly even though you eat sensibly?','cravings']
    ];
    var OPTS = [['Never',0],['Sometimes',1],['Often',2]];
    var TYPES = {
      sleep:{badge:'🌙',name:'The Restless One',sub:'Your type: cortisol doesn\'t drop enough at night',
        msg:'Your answers suggest your body struggles to wind down in the evening and your sleep isn\'t what it used to be. Reset your cortisol curve and deeper sleep tends to follow.',
        plan:['An evening wind-down and dimmed lights 60 minutes before bed','Morning daylight to set your cortisol curve','A steady dinner with protein to stop night waking']},
      tension:{badge:'⚡',name:'The Overloaded One',sub:'Your type: your body is often on high alert',
        msg:'Your answers point to "always on guard". Your body can\'t switch the alarm off. A few minutes of calm a day can genuinely bring cortisol down.',
        plan:['2-minute breathing breaks during the day','Movement that calms (walking), not exhausts','Micro-habits to switch the alarm off']},
      energy:{badge:'🔋',name:'The Depleted One',sub:'Your type: your energy is drained from the bottom',
        msg:'Your answers point to deep tiredness that coffee can no longer fix. Your body is asking for recovery and steady fuel, not another push.',
        plan:['A protein breakfast first thing','Gentle movement plus enough recovery','An end to afternoon energy crashes']},
      cravings:{badge:'🍫',name:'The Unsteady One',sub:'Your type: your blood sugar is on a swing',
        msg:'Your answers point to swinging blood sugar and cravings that "willpower" can\'t beat. A steady plate is your biggest lever.',
        plan:['Protein with every meal','Regularity instead of fasting then sugar binges','A plate that keeps your energy from crashing']}
    };
    var ORDER = ['sleep','tension','energy','cravings'];

    var stage = document.getElementById('qstage');
    var bar = document.getElementById('qbar');
    var i = 0, total = Q.length;
    var cat = {sleep:0,tension:0,energy:0,cravings:0};
    var y = document.getElementById('year'); if (y) y.textContent = new Date().getFullYear();
    function setBar(p){ bar.style.width = p + '%'; }

    function intro(){
      setBar(0);
      stage.innerHTML =
        '<div class="q-intro"><div class="q-badge" aria-hidden="true">🌿</div>' +
        '<p>Answer honestly based on the last few weeks. Nothing is stored anywhere without your consent.</p>' +
        '<button class="btn btn--big" id="qstart">Find my type</button></div>';
      document.getElementById('qstart').addEventListener('click', function(){ i=0; cat={sleep:0,tension:0,energy:0,cravings:0}; render(); });
    }
    function render(){
      setBar(Math.round((i/total)*100));
      var opts = OPTS.map(function(o){ return '<button class="q-opt" data-v="'+o[1]+'"><span class="dot" aria-hidden="true"></span>'+o[0]+'</button>'; }).join('');
      stage.innerHTML = '<div class="q-step">Question '+(i+1)+' of '+total+'</div>' +
        '<div class="q-question">'+Q[i][0]+'</div><div class="q-opts">'+opts+'</div>';
      [].forEach.call(stage.querySelectorAll('.q-opt'), function(b){
        b.addEventListener('click', function(){
          cat[Q[i][1]] += parseInt(b.getAttribute('data-v'),10);
          i++; if (i<total) render(); else result();
        });
      });
    }
    function result(){
      setBar(100);
      var totalScore = cat.sleep+cat.tension+cat.energy+cat.cravings;
      var pct = Math.round((totalScore/(total*2))*100);
      var top = ORDER[0];
      ORDER.forEach(function(c){ if (cat[c] > cat[top]) top = c; });
      var t = TYPES[top];
      var load = pct < 33 ? 'low' : (pct < 66 ? 'moderate' : 'high');
      var planLis = t.plan.map(function(p){ return '<li>'+p+'</li>'; }).join('');
      stage.innerHTML =
        '<div class="q-result">' +
        '<div class="q-badge" aria-hidden="true">'+t.badge+'</div>' +
        '<div class="q-tier">'+t.name+'</div>' +
        '<div class="q-sub">'+t.sub+'</div>' +
        '<div class="q-meter" aria-hidden="true"><i id="qm"></i></div>' +
        '<div class="q-sub">Stress load: '+load+'</div>' +
        '<p class="q-msg">'+t.msg+'</p>' +
        '<div class="q-plan"><b>Your 28-day plan — priorities:</b><ul>'+planLis+'</ul></div>' +
        '<form id="qform" novalidate>' +
          '<p style="font-weight:700;color:var(--sage-ink);margin-bottom:.3rem">I\'ll send your detailed result + tailored plan</p>' +
          '<div class="q-email"><input type="email" name="email" placeholder="you@email.com" autocomplete="email" required><button class="btn" type="submit">Send</button></div>' +
        '</form>' +
        '<div id="qafter"></div>' +
        '<a href="index.html#cena" class="btn btn--big btn--block" style="margin-top:.6rem">I want Cortisol Reset</a>' +
        '<p class="q-disc">This quiz is <strong>indicative only</strong> and does not replace a medical diagnosis. Only a doctor can reliably measure your cortisol. If your symptoms are persistent or severe, please speak to your doctor.</p>' +
        '</div>';
      setTimeout(function(){ var m=document.getElementById('qm'); if(m) m.style.width = Math.max(8,pct) + '%'; }, 80);
      var f = document.getElementById('qform');
      f.addEventListener('submit', function(e){
        e.preventDefault();
        var email = f.email.value.trim();
        if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)){ f.email.focus(); return; }
        /* === Hook up e-mail capture here (Ecomail / Mailchimp / SmartEmailing) === */
        f.style.display='none';
        document.getElementById('qafter').innerHTML =
          '<p style="color:var(--sage-deep);font-weight:700">Thank you! 💌 Your result and plan are on the way to your inbox.</p>' +
          '<div class="q-discount">🎁 A bonus for finishing: code <b>RESET10</b> for <b>−10%</b> off Cortisol Reset.</div>';
      });
    }
    intro();
  })();
  </script>
</body>
</html>
