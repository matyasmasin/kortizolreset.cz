name: Deploy to WEDOS (FTP)

# Po nastavení FTP secrets (viz README) odkomentuj blok "push" níže —
# pak se web po každém pushi do main sám nahraje na WEDOS.
on:
  workflow_dispatch:
  # push:
  #   branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          # Webový kořen na WEDOS, např. /www/domains/kortizolreset.cz/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            .claude/**
            README.md
            .gitignore
