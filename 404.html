<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stránka nenalezena (404) — Kortizol Reset</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%234B6B53'/%3E%3Cpath d='M16 7c5 3 7 6 7 10a7 7 0 1 1-14 0c0-4 2-7 7-10z' fill='%23D7AE63'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,400..600&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{ --cream:#FBF6EE; --sage:#6E9476; --sage-deep:#4B6B53; --ink:#2C3F31; --clay:#C76B4E; --muted:#6F695E; }
    *{box-sizing:border-box;margin:0}
    body{min-height:100vh;display:grid;place-items:center;text-align:center;padding:2rem;
      background:radial-gradient(circle at 70% 10%, #F4DFD3, transparent 55%), var(--cream);
      font-family:"Plus Jakarta Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);}
    .mark{width:64px;height:64px;border-radius:18px;margin:0 auto 1.5rem;display:grid;place-items:center;
      background:linear-gradient(150deg,var(--sage),var(--sage-deep));box-shadow:0 18px 40px -20px rgba(43,51,38,.5)}
    .mark svg{width:36px;height:36px}
    .code{font-family:"Fraunces",Georgia,serif;font-size:clamp(4rem,18vw,8rem);line-height:1;color:var(--sage-deep)}
    h1{font-family:"Fraunces",Georgia,serif;font-weight:560;font-size:clamp(1.5rem,5vw,2.2rem);margin:.4rem 0 .6rem}
    p{color:var(--muted);max-width:46ch;margin:0 auto 1.8rem}
    .btns{display:flex;gap:.8rem;flex-wrap:wrap;justify-content:center}
    a.btn{display:inline-flex;align-items:center;gap:.5rem;font-weight:700;text-decoration:none;border-radius:999px;padding:.9em 1.7em;
      background:var(--clay);color:#fff;box-shadow:0 14px 30px -12px rgba(199,107,78,.7)}
    a.btn.ghost{background:transparent;color:var(--sage-deep);box-shadow:inset 0 0 0 2px #E6DACA}
    a.btn:hover{transform:translateY(-2px)}
    .lang{margin-top:1.4rem;font-size:.85rem;color:var(--muted)}
    .lang a{color:var(--sage-deep);font-weight:700}
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 3c4 2.5 6 5 6 8.5A6 6 0 1 1 6 11.5C6 8 8 5.5 12 3z" fill="#D7AE63"/></svg>
    </div>
    <div class="code">404</div>
    <h1>Tahle stránka se nám ztratila</h1>
    <p>Možná byla přesunuta nebo zadaná adresa nesedí. Vrať se na úvod a pokračuj v klidu dál.</p>
    <div class="btns">
      <a class="btn" href="/">Zpět na úvod</a>
      <a class="btn ghost" href="/en/">English version</a>
    </div>
    <p class="lang">This page could not be found. <a href="/">Go to homepage →</a></p>
  </main>
</body>
</html>
